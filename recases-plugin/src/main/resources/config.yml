# Версия структуры конфига
# Нужна плагину для автоматической миграции старых конфигов после обновления
config-version: 11

settings:
  # Unique server id used in audit/webhooks when several servers share one database
  server-id: default
  schematics:
    # Общий переключатель сцен из .schem/.schematic файлов для анимаций
    enabled: false
    # Папка внутри plugins/ReCases, откуда загружаются файлы схем
    folder: schematics
    animations:
      classic:
        enabled: false
        file: classic-stage.schem
        offset:
          x: -2
          y: -1
          z: -2
        # Если true, воздух из схемы не будет затирать существующий мир
        ignore-air: false
  opening-guard:
    # На каком расстоянии от кейса ставить игрока в точку открытия
    owner-anchor-distance: 2.15
    # Насколько далеко владелец открытия может отойти от кейса
    owner-max-distance: 12.0
    # На этой дистанции игрок уже не просто тянется, а мягко возвращается ближе к кейсу
    owner-snap-distance: 5.0
    # Если игрок улетел слишком далеко или оказался вне мира кейса, его вернет к кейсу
    owner-hard-teleport-distance: 12.0
    # Сила возврата владельца к кейсу
    owner-pull-strength: 1.6
    owner-pull-vertical: 0.45
    # Радиус, в котором других игроков будет отталкивать от активного кейса
    other-player-radius: 3.5
    # Сила отбрасывания других игроков
    other-player-push-strength: 1.4
    other-player-push-vertical: 0.35
  animations:
    # Глобальные множители интенсивности анимации
    intensity:
      # Масштабирует количество частиц в сценах открытия и объявления победителя
      particles: 1.0
      # Масштабирует громкость звука в сценах открытия и объявления победителя
      sound: 1.0
    performance:
      # Быстрый профиль анимаций: pretty, balanced, lite
      profile: balanced
      # Автоматически снижать нагрузку анимаций при нескольких одновременных открытиях
      adaptive-load: true
    dynamic-selection:
      # Automatically swap heavy animations to lighter ones when player is far away or server is under load
      enabled: true
      max-player-distance: 24.0
      active-openings-threshold: 4
      min-tps: 18.5
      distant-fallback: classic
      overload-fallback: classic
      medium-overload-fallback: circle
    winner-item:
      # Амплитуда горизонтальной тряски для парящего предмета награды
      shake-amplitude: 0.06
      # Базовая высота подъема над точкой появления
      levitation-height: 0.45
      # Сила вертикального покачивания, пока предмет парит
      bob-strength: 0.12
    wheel:
      # Количество слотов на колесе
      prize-count: 8
      # Радиус вертикального колеса
      radius: 2.0
      # Высота центра колеса над кейсом
      y-offset: 1.1
      # Ось вращения вертикального колеса: x или z
      axis: z
      # Задержка между появлением слотов
      spawn-interval-ticks: 4
      # Начальная скорость вращения
      max-speed: 16.0
      # Минимальная скорость перед финальной доводкой
      min-speed: 2.0
      # Насколько быстро колесо замедляется
      speed-fade: 0.09
      # Минимальный общий угол прокрутки до остановки
      min-total-rotation: 540.0
      # Угол, в котором должен остановиться победитель
      settle-degrees: 270.0
      # Основная частица шлейфа вокруг слотов
      particle: FLAME
      # Частица победителя и прилета в кейс
      win-particle: DRAGON_BREATH
      # Частица исчезновения проигравших слотов
      vanish-particle: SMOKE
      color:
        # Цвет для частицы DUST/REDSTONE, если выберешь ее в particle или win-particle
        red: 101
        green: 20
        blue: 5
    sphere:
      item-count: 16
      radius: 2.5
      min-radius: 1.8
      y-offset: 1.5
      spawn-interval-ticks: 2
      rotation-speed-x: 1.25
      rotation-speed-y: 1.75
      total-rotation: 360.0
      vector-interval-ticks: 14
      shrink-step: 0.05
      neighbor-distance-factor: 1.0
      line-step: 0.2
      vector-particle: FLAME
      item-particle: END_ROD
      win-particle: DRAGON_BREATH
      color:
        red: 101
        green: 20
        blue: 5
    neural:
      grid-size: 3
      vertical-layers: 3
      spacing: 1.2
      y-offset: 1.2
      spawn-interval-ticks: 2
      spawn-duration-ticks: 7
      spawn-rise-distance: 0.8
      network-ticks: 40
      eliminate-interval-ticks: 10
      winner-highlight-ticks: 24
      overload-ticks: 8
      impulse-cycle-ticks: 18
      jitter: 0.05
      line-step: 0.2
      connection-distance: 2.5
      layer-height: 0.55
      hover-rise-height: 0.65
      hover-spin-per-tick: 18.0
      color:
        base:
          red: 80
          green: 170
          blue: 255
          size: 1.15
        line:
          red: 110
          green: 210
          blue: 255
          size: 0.95
        error:
          red: 255
          green: 90
          blue: 90
          size: 1.2
        winner:
          red: 255
          green: 215
          blue: 90
          size: 1.3
    anchor-rise:
      rise-duration: 30
      hover-duration: 20
      fall-duration: 20
      item-change-interval: 5
      rise-speed: 0.2
      rise-height: 6.0
      fall-multiplier: 0.05
      fake-reward-pool-size: 12
    rainly:
      falling-particle: DRIPPING_OBSIDIAN_TEAR
      reward-change-interval: 4
      reveal-ticks: 30
      end-ticks: 70
  storage:
    # sqlite - локальная база в папке плагина
    # mysql - внешняя MySQL база
    type: sqlite
    # Если найден старый keys.yml, плагин перенесет данные в выбранное хранилище
    migrate-from-yaml: true
    sqlite:
      # Имя файла SQLite базы внутри папки плагина
      file: keys.db
    mysql:
      # Настройки используются только если type: mysql
      host: 127.0.0.1
      port: 3306
      database: recases
      username: root
      password: ''
      use-ssl: false
  locale:
    # Язык встроенных сообщений: ru или en
    default: ru
  webhooks:
    discord:
      # Вебхук уведомлений о редких/гарантированных наградах
      enabled: false
      url: ''
      username: ReCases
      avatar-url: ''
      notify-rare: true
      notify-guaranteed: true
      embed:
        rare-color: 7929855
        guaranteed-color: 16766720
        default-color: 7631988
        # Optional thumbnail URL with placeholders:
        # %player% %player_uuid% %case% %instance% %animation% %reward% %reward_id% %transaction% %server%
        thumbnail-url: ''
      links:
        docs:
          label: Open Docs
          url: 'https://example.com/cases/%case%'
        audit:
          label: Open Audit
          url: 'https://example.com/audit/%transaction%'
  opening-recovery:
    # grant-if-possible = deliver saved pending rewards on next join, refund = always return the key
    mode: grant-if-possible
  updater:
    # Проверка новых версий на Spigot
    enabled: false
    # Выполнять проверку при запуске и /cases reload
    check-on-startup: true
    # Показывать админам сообщение о новой версии при входе
    notify-admins-on-join: true
    # Если true, плагин скачает новый jar в папку /plugins/update
    auto-download: false
    # ID ресурса на Spigot (обязательно, если включен updater)
    resource-id: 0
    # Таймаут HTTP-запросов updater-а
    timeout-seconds: 10
    # Необязательная прямая ссылка на jar (если пусто, используется Spiget download endpoint)
    download-url: ''
  network-sync:
    # Общая синхронизация ключей и статистики между серверами
    # Работает только с settings.storage.type: mysql
    enabled: false
    # Как часто перечитывать shared data из MySQL
    poll-interval-seconds: 15
    # Сбрасывать локальный кеш ключей и читать актуальный баланс из БД
    sync-keys: true
    # Подтягивать статистику и pity между несколькими серверами
    sync-stats: true
  presets:
    # Папка внутри plugins/ReCases для экспортов/импортов пресетов
    folder: presets

  metrics:
    bstats:
      # Enable bStats after registering the plugin and setting a valid plugin id.
      enabled: true
      # Get the id from https://bstats.org/what-is-my-plugin-id
      plugin-id: 30513

console:
  yaml-migrated: 'Migrated keys.yml to %storage% storage.'
  unknown-reward-action: 'Unknown reward command action: %action%'
  storage-fallback: 'MySQL is unavailable. Falling back to SQLite'

menus:
  case-selector:
    # Заголовок меню выбора профиля кейса
    title: '#ffd166Кейсы'
    # Количество рядов: от 1 до 6
    rows: 6
  preview:
    title: '#74c0fcПревью %profile%'

leaderboards:
  # Как часто обновлять голограммы топов
  update-interval-seconds: 30
  holograms:
    top-opens-global:
      # Координаты самой голограммы
      location:
        world: world
        x: 238.0
        y: 73.2
        z: 244.0
      views:
        global-opens:
          # Глобальный топ по количеству открытий
          type: opens
          limit: 5
          header:
            - '#ffd166&lТОП ОТКРЫТИЙ'
            - '#ffffffРежим: %scope%'
            - '#a8dadcКлик: %next_scope%'
          lines:
            - '#a8dadc#%position% #ffffff%player% #ffd166- %value%'
          empty-lines:
            - '#ff6b6bПока нет данных'
        donate-rare:
          # Топ редких наград по профилю donate
          type: rare
          profile: donate
          limit: 5
          header:
            - '#74c0fc&lТОП РЕДКИХ DONATE'
            - '#ffffffРежим: %scope%'
            - '#a8dadcКлик: %next_scope%'
          lines:
            - '#a8dadc#%position% #ffffff%player% #74c0fc- %value%'
          empty-lines:
            - '#ff6b6bПока нет данных'
        donate-guaranteed:
          # Топ срабатываний гаранта по профилю donate
          type: guaranteed
          profile: donate
          limit: 5
          header:
            - '#80ed99&lТОП ГАРАНТА DONATE'
            - '#ffffffРежим: %scope%'
            - '#a8dadcКлик: %next_scope%'
          lines:
            - '#a8dadc#%position% #ffffff%player% #80ed99- %value%'
          empty-lines:
            - '#ff6b6bПока нет данных'
      # views = список экранов одной и той же голограммы.
      # Игрок кликает по голограмме и она переключается на следующий view по кругу
      # type: opens | rare | guaranteed
      # profile указывается только если нужен топ по конкретному профилю кейса
      # Доступные плейсхолдеры в строках:
      # %position% - место в топе
      # %player% - имя игрока
      # %value% - значение топа
      # %scope% - текущая область (global или id профиля)
      # %next_scope% - что будет показано после следующего клика
      #
      # PlaceholderAPI:
      # %recases_hologram_top-opens-global_scope%
      # %recases_hologram_top-opens-global_type%
      # %recases_hologram_top-opens-global_view%
      # %recases_hologram_top-opens-global_next_scope%

cases:
  instances:
    # Здесь задаются физические точки кейсов в мире
    # Можно создать несколько отдельных точек: main, vip, spawn и т.д.
    main:
      # Анимация именно для этой физической точки
      # Если оставить пусто, плагин возьмет анимацию из profile
      # Доступно: classic, circle, meteor-drop, void-rift, wheel, sphere, swords, anchor-rise, rainly, neural
      animation: classic
      location:
        world: world
        x: 232.0
        y: 70.0
        z: 244.0
      hologram:
        # Строки голограммы над физическим кейсом.
        lines:
          - '#ffd166&lКЕЙС'
          - '#ffffffНажмите, чтобы открыть меню'

profiles:
  # Здесь задаются логические профили кейсов
  # Профиль = иконка в меню + набор возможных наград
  donate:
    # Анимация для этого профиля кейса.
    # Доступно: classic, circle, meteor-drop, void-rift, wheel, sphere, swords, anchor-rise, rainly, neural
    animation: classic
    guarantee:
      # После скольких открытий без rare-награды сработает гарант
      # 0 = гарант отключен.
      after-opens: 10
    menu:
      # Материал и слот предмета в меню выбора кейса
      material: DIAMOND_SWORD
      slot: 22
      display: '#ffd166&lДонат-кейс'
      lore:
        - '#a8dadcОткройте кейс и выберите сундук.'
        - '#a8dadcВаших ключей: #ffffff%keys%'
    rewards:
      # У каждой награды есть material, name, chance и actions
      # chance - вес награды в общем пуле. Чем больше число, тем выше шанс
      giga:
        material: 'HEAD;eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYTZiOGQ4NzQ1ZjZmYzdhMGE3NzM1NGNlMWE5ZjMwNDY4MTdmNjZkMmQzYWZkMWJjZGFjNmQyZDEwZjM3OSJ9fX0='
        name: '#ffd166ГИГА'
        rare: true
        chance: 20
        actions:
          # Форматы:
          # message;<text>
          # broadcast;<text>
          # command;<console command>
          # title;<title>;<subtitle>
          # lp-group-add;<group>
          # lp-group-remove;<group>
          # lp-group-add-temp;<group>;<duration>
          # lp-permission-set;<permission>;<true|false>
          # item-give[;<amount>] или item-give;<material>;<amount>
          # sound;<sound>;<volume>;<pitch>
          # firework;<color|#hex[,#hex]>;<type>;<power>
          # effect;<potion_effect>;<duration_ticks>;<amplifier>
          # broadcast-hover;<text>;<hover text>
          # random-command-group;<cmd1>|<cmd2>|<cmd3>
          - 'message;#ffd166Поздравляем! Вы выиграли #ffffffГИГА'
          - 'title;#ffd166Поздравляем!;#ffffffТеперь у вас ранг ГИГА'
          - 'lp-group-add;giga'
      sword:
        material: 'ITEM;DIAMOND_SWORD'
        name: '#74c0fcАлмазный меч'
        chance: 30
        actions:
          - 'message;#ffd166Поздравляем! Вы выиграли #74c0fcАлмазный меч'
          - 'command;give %player% diamond_sword 1'
      iron:
        material: 'ITEM;IRON_SWORD'
        name: '#f1f3f5Железный меч'
        chance: 30
        actions:
          - 'message;#ffd166Поздравляем! Вы выиграли #f1f3f5Железный меч'
          - 'command;give %player% iron_sword 1'
      gold:
        material: 'ITEM;GOLDEN_SWORD'
        name: '#ffd166Золотой меч'
        chance: 20
        actions:
          - 'message;#ffd166Поздравляем! Вы выиграли #ffd166Золотой меч'
          - 'command;give %player% golden_sword 1'
